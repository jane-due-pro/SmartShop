<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop - 登录</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Login Page Specific Styles */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(74, 144, 226, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            animation: backgroundPulse 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes backgroundPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: var(--space-8);
        }

        .login-card {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-2xl);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 100px rgba(212, 175, 55, 0.1);
            overflow: hidden;
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            padding: var(--space-10) var(--space-8) var(--space-8);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(74, 144, 226, 0.05) 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-6);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--color-secondary-dark);
            box-shadow: var(--shadow-glow);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .login-title {
            font-family: var(--font-display);
            font-size: var(--text-3xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .login-subtitle {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-body {
            padding: var(--space-8);
        }

        .tabs {
            display: flex;
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--space-1);
            margin-bottom: var(--space-8);
        }

        .tab {
            flex: 1;
            padding: var(--space-4);
            text-align: center;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            opacity: 0;
            transition: opacity var(--transition-fast);
            z-index: -1;
        }

        .tab.active {
            color: var(--color-secondary-dark);
            box-shadow: var(--shadow-md);
        }

        .tab.active::before {
            opacity: 1;
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
            background: var(--bg-tertiary);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: var(--space-6);
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: var(--space-3);
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: var(--text-lg);
            transition: color var(--transition-fast);
        }

        .form-input {
            width: 100%;
            padding: var(--space-4) var(--space-4) var(--space-4) var(--space-12);
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 2px solid var(--border-primary);
            border-radius: var(--radius-lg);
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .form-input:focus + .input-icon,
        .form-input:focus ~ .input-icon {
            color: var(--color-primary);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .code-group {
            display: flex;
            gap: var(--space-3);
        }

        .code-group .form-input {
            flex: 1;
        }

        .btn-code {
            white-space: nowrap;
            padding: var(--space-4) var(--space-6);
            background: var(--bg-elevated);
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: var(--text-sm);
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .btn-code:hover:not(:disabled) {
            background: var(--color-primary);
            color: var(--color-secondary-dark);
        }

        .btn-code:disabled {
            background: var(--bg-secondary);
            color: var(--text-muted);
            border-color: var(--border-primary);
            cursor: not-allowed;
        }

        .btn-login {
            width: 100%;
            padding: var(--space-5);
            margin-top: var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-base);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: var(--color-secondary-dark);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            padding: var(--space-6) var(--space-8);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-primary);
            text-align: center;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: var(--space-6);
        }

        .links a {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--transition-fast);
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-primary);
            transition: width var(--transition-fast);
        }

        .links a:hover {
            color: var(--color-primary);
        }

        .links a:hover::after {
            width: 100%;
        }

        .alert {
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-6);
            font-size: var(--text-sm);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: var(--space-3);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.1);
            color: var(--color-danger);
            border: 1px solid rgba(231, 76, 60, 0.2);
        }

        .alert-success {
            background: rgba(46, 204, 113, 0.1);
            color: var(--color-success);
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .alert-icon {
            font-size: var(--text-lg);
        }

        /* Decorative Elements */
        .decorative-dots {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: grid;
            grid-template-columns: repeat(3, 8px);
            gap: 8px;
            opacity: 0.3;
        }

        .decorative-dots span {
            width: 8px;
            height: 8px;
            background: var(--color-primary);
            border-radius: 50%;
            animation: dotPulse 2s ease-in-out infinite;
        }

        .decorative-dots span:nth-child(2) {
            animation-delay: 0.3s;
        }

        .decorative-dots span:nth-child(3) {
            animation-delay: 0.6s;
        }

        .decorative-dots span:nth-child(4) {
            animation-delay: 0.9s;
        }

        .decorative-dots span:nth-child(5) {
            animation-delay: 1.2s;
        }

        .decorative-dots span:nth-child(6) {
            animation-delay: 1.5s;
        }

        .decorative-dots span:nth-child(7) {
            animation-delay: 1.8s;
        }

        .decorative-dots span:nth-child(8) {
            animation-delay: 2.1s;
        }

        .decorative-dots span:nth-child(9) {
            animation-delay: 2.4s;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-container {
                padding: var(--space-4);
            }
            
            .login-card {
                border-radius: var(--radius-xl);
            }
            
            .login-header {
                padding: var(--space-8) var(--space-6) var(--space-6);
            }
            
            .login-body {
                padding: var(--space-6);
            }
            
            .login-footer {
                padding: var(--space-4) var(--space-6);
            }
            
            .links {
                flex-direction: column;
                gap: var(--space-4);
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">S</div>
                    <h1 class="login-title">SmartShop</h1>
                    <p class="login-subtitle">智慧商城管理系统</p>
                </div>

                <div class="login-body">
                    <div th:if="${param.error}" class="alert alert-error">
                        <span class="alert-icon">⚠️</span>
                        用户名或密码错误，请重试
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        <span class="alert-icon">✓</span>
                        已成功退出登录
                    </div>

                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('password')">密码登录</div>
                        <div class="tab" onclick="switchTab('email')">邮箱验证码登录</div>
                    </div>

                    <div id="password-tab" class="tab-content active">
                        <form th:action="@{/doLogin}" method="post">
                            <div class="form-group">
                                <label class="form-label">用户名</label>
                                <div class="input-wrapper">
                                    <input type="text" name="username" class="form-input" placeholder="请输入用户名" required>
                                    <span class="input-icon">👤</span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">密码</label>
                                <div class="input-wrapper">
                                    <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
                                    <span class="input-icon">🔒</span>
                                </div>
                            </div>
                            <button type="submit" class="btn-login">登 录</button>
                        </form>
                    </div>

                    <div id="email-tab" class="tab-content">
                        <div class="form-group">
                            <label class="form-label">邮箱地址</label>
                            <div class="input-wrapper">
                                <input type="email" id="emailLogin" class="form-input" placeholder="请输入邮箱">
                                <span class="input-icon">📧</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">验证码</label>
                            <div class="code-group">
                                <div class="input-wrapper" style="flex: 1;">
                                    <input type="text" id="emailCode" class="form-input" placeholder="请输入6位验证码">
                                    <span class="input-icon">🔑</span>
                                </div>
                                <button class="btn-code" id="sendEmailCode" onclick="sendCode('emailLogin', '邮箱登录验证码')">获取验证码</button>
                            </div>
                        </div>
                        <button class="btn-login" onclick="emailLogin()">登 录</button>
                    </div>
                </div>

                <div class="login-footer">
                    <div class="links">
                        <a th:href="@{/register}">注册账号</a>
                        <a th:href="@{/resetPassword}">找回密码</a>
                    </div>
                </div>

                <div class="decorative-dots">
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if (type === 'password') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('password-tab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('email-tab').classList.add('active');
            }
        }

        let countdown = 0;
        function sendCode(inputId, type) {
            const email = document.getElementById(inputId).value;
            if (!email) { 
                alert('请输入邮箱地址'); 
                return; 
            }
            const btn = document.getElementById('sendEmailCode');
            btn.disabled = true;
            fetch('/sendCode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&type=' + encodeURIComponent(type)
            })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    countdown = 60;
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = countdown + 's';
                        if (countdown <= 0) { 
                            clearInterval(timer); 
                            btn.textContent = '获取验证码'; 
                            btn.disabled = false; 
                        }
                    }, 1000);
                } else { 
                    btn.disabled = false; 
                }
            })
            .catch(() => { 
                alert('请求失败'); 
                btn.disabled = false; 
            });
        }

        function emailLogin() {
            const email = document.getElementById('emailLogin').value;
            const code = document.getElementById('emailCode').value;
            if (!email || !code) { 
                alert('请填写完整信息'); 
                return; 
            }
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/doLogin';
            const u = document.createElement('input'); 
            u.name='username'; 
            u.value=email+'__email_code__'+code; 
            form.appendChild(u);
            const p = document.createElement('input'); 
            p.name='password'; 
            p.value='__email_code__'; 
            form.appendChild(p);
            document.body.appendChild(form); 
            form.submit();
        }

        // Add input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--color-primary)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--text-muted)';
            });
        });
    </script>
</body>
</html>
