<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop - 登录</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Login Page Specific Styles */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(126, 184, 218, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(107, 163, 232, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(126, 184, 218, 0.08) 0%, transparent 70%);
            animation: backgroundPulse 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes backgroundPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: var(--space-8);
        }

        .login-card {
            background: #ffffff;
            border-radius: var(--radius-2xl);
            border: 1px solid rgba(126, 184, 218, 0.2);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.1),
                0 0 100px rgba(126, 184, 218, 0.1);
            overflow: hidden;
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            padding: var(--space-10) var(--space-8) var(--space-8);
            background: linear-gradient(135deg, rgba(126, 184, 218, 0.1) 0%, rgba(107, 163, 232, 0.05) 100%);
            border-bottom: 1px solid rgba(126, 184, 218, 0.1);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-6);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-3xl);
            font-weight: 700;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(126, 184, 218, 0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .login-title {
            font-family: var(--font-display);
            font-size: var(--text-3xl);
            font-weight: 600;
            color: #333333;
            margin-bottom: var(--space-2);
        }

        .login-subtitle {
            font-size: var(--text-sm);
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-body {
            padding: var(--space-8);
        }

        .form-group {
            margin-bottom: var(--space-6);
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: var(--space-3);
            font-size: var(--text-xs);
            font-weight: 600;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: #999999;
            font-size: var(--text-lg);
            transition: color var(--transition-fast);
        }

        .form-input {
            width: 100%;
            padding: var(--space-4) var(--space-4) var(--space-4) var(--space-12);
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: #333333;
            background: #f5f7fa;
            border: 2px solid #e0e4e8;
            border-radius: var(--radius-lg);
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(126, 184, 218, 0.15);
            background: #ffffff;
        }

        .form-input:focus + .input-icon,
        .form-input:focus ~ .input-icon {
            color: var(--color-primary);
        }

        .form-input::placeholder {
            color: #aaaaaa;
        }

        /* Password Toggle */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999999;
            cursor: pointer;
            padding: var(--space-2);
            font-size: var(--text-lg);
            transition: color var(--transition-fast);
        }

        .password-toggle:hover {
            color: var(--color-primary);
        }

        .password-input {
            padding-right: var(--space-12);
        }

        /* Email Code Group */
        .code-group {
            display: flex;
            gap: var(--space-3);
        }

        .code-group .form-input {
            flex: 1;
        }

        .btn-code {
            white-space: nowrap;
            padding: var(--space-4) var(--space-6);
            background: #ffffff;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: var(--text-sm);
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .btn-code:hover:not(:disabled) {
            background: var(--color-primary);
            color: #ffffff;
        }

        .btn-code:disabled {
            background: #f0f0f0;
            color: #aaaaaa;
            border-color: #dddddd;
            cursor: not-allowed;
        }

        .btn-login {
            width: 100%;
            padding: var(--space-5);
            margin-top: var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-base);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(126, 184, 218, 0.4);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            padding: var(--space-6) var(--space-8);
            background: #f5f7fa;
            border-top: 1px solid #e0e4e8;
            text-align: center;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: var(--space-6);
            flex-wrap: wrap;
        }

        .links a {
            font-size: var(--text-sm);
            color: #666666;
            text-decoration: none;
            transition: color var(--transition-fast);
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-primary);
            transition: width var(--transition-fast);
        }

        .links a:hover {
            color: var(--color-primary);
        }

        .links a:hover::after {
            width: 100%;
        }

        .alert {
            padding: var(--space-4) var(--space-5);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-6);
            font-size: var(--text-sm);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: var(--space-3);
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #fed7d7;
        }

        .alert-success {
            background: #f0fff4;
            color: #276749;
            border: 1px solid #c6f6d5;
        }

        .alert-icon {
            font-size: var(--text-lg);
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-container {
                padding: var(--space-4);
            }
            
            .login-card {
                border-radius: var(--radius-xl);
            }
            
            .login-header {
                padding: var(--space-8) var(--space-6) var(--space-6);
            }
            
            .login-body {
                padding: var(--space-6);
            }
            
            .login-footer {
                padding: var(--space-4) var(--space-6);
            }
            
            .links {
                flex-direction: column;
                gap: var(--space-3);
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">S</div>
                    <h1 class="login-title">SmartShop</h1>
                    <p class="login-subtitle">智慧商城管理系统</p>
                </div>

                <div class="login-body">
                    <div th:if="${param.error}" class="alert alert-error">
                        <span class="alert-icon">⚠️</span>
                        用户名或密码错误，请重试
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        <span class="alert-icon">✓</span>
                        已成功退出登录
                    </div>

                    <form th:action="@{/doLogin}" method="post">
                        <div class="form-group">
                            <label class="form-label">用户名</label>
                            <div class="input-wrapper">
                                <input type="text" name="username" class="form-input" placeholder="请输入用户名" required>
                                <span class="input-icon">👤</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">密码</label>
                            <div class="input-wrapper password-wrapper">
                                <input type="password" name="password" id="password" class="form-input password-input" placeholder="请输入密码" required>
                                <span class="input-icon">🔒</span>
                                <button type="button" class="password-toggle" onclick="togglePassword()">
                                    <span id="eyeIcon">👁️</span>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn-login">登 录</button>
                    </form>
                </div>

                <div class="login-footer">
                    <div class="links">
                        <a href="javascript:void(0)" onclick="showEmailLogin()">邮箱验证码登录</a>
                        <a th:href="@{/register}">注册账号</a>
                        <a th:href="@{/resetPassword}">找回密码</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Email Login Modal -->
    <div id="emailModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center;">
        <div style="background: #ffffff; border-radius: 16px; padding: 32px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);">
            <h3 style="margin: 0 0 24px 0; color: #333333; font-size: 20px; text-align: center;">邮箱验证码登录</h3>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 12px; color: #555555; text-transform: uppercase; letter-spacing: 1px;">邮箱地址</label>
                <input type="email" id="emailLogin" style="width: 100%; padding: 12px; border: 2px solid #e0e4e8; border-radius: 8px; font-size: 14px; box-sizing: border-box;" placeholder="请输入邮箱">
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display: block; margin-bottom: 8px; font-size: 12px; color: #555555; text-transform: uppercase; letter-spacing: 1px;">验证码</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="emailCode" style="flex: 1; padding: 12px; border: 2px solid #e0e4e8; border-radius: 8px; font-size: 14px;" placeholder="请输入6位验证码">
                    <button id="sendEmailCode" onclick="sendCode()" style="white-space: nowrap; padding: 12px 16px; background: #ffffff; color: #7eb8da; border: 2px solid #7eb8da; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;">获取验证码</button>
                </div>
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="closeEmailLogin()" style="flex: 1; padding: 12px; background: #f5f7fa; color: #666666; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">取消</button>
                <button onclick="emailLogin()" style="flex: 1; padding: 12px; background: linear-gradient(135deg, #7eb8da 0%, #5a9bc0 100%); color: #ffffff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;">登 录</button>
            </div>
        </div>
    </div>

    <script>
        // Toast Notification System
        function showToast(message, type) {
            const container = document.querySelector('.toast-container') || createToastContainer();
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type || 'info'}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type || 'info']}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);
            return container;
        }

        // Save message before redirect
        function showToastAndRedirect(message, type, url) {
            sessionStorage.setItem('toastMessage', message);
            sessionStorage.setItem('toastType', type || 'info');
            window.location.href = url;
        }

        // Show saved message on page load
        window.addEventListener('DOMContentLoaded', function() {
            const message = sessionStorage.getItem('toastMessage');
            const type = sessionStorage.getItem('toastType');
            if (message) {
                showToast(message, type);
                sessionStorage.removeItem('toastMessage');
                sessionStorage.removeItem('toastType');
            }
        });

        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        }

        // Show Email Login Modal
        function showEmailLogin() {
            document.getElementById('emailModal').style.display = 'flex';
        }

        // Close Email Login Modal
        function closeEmailLogin() {
            document.getElementById('emailModal').style.display = 'none';
        }

        // Send Verification Code
        let countdown = 0;
        function sendCode() {
            const email = document.getElementById('emailLogin').value;
            if (!email) { 
                showToast('请输入邮箱地址', 'warning');
                return; 
            }
            const btn = document.getElementById('sendEmailCode');
            btn.disabled = true;
            fetch('/sendCode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&type=' + encodeURIComponent('邮箱登录验证码')
            })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    countdown = 60;
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = countdown + 's';
                        if (countdown <= 0) { 
                            clearInterval(timer); 
                            btn.textContent = '获取验证码'; 
                            btn.disabled = false; 
                        }
                    }, 1000);
                } else { 
                    btn.disabled = false; 
                }
            })
            .catch(() => { 
                showToast('请求失败', 'error');
                btn.disabled = false; 
            });
        }

        // Email Login
        function emailLogin() {
            const email = document.getElementById('emailLogin').value;
            const code = document.getElementById('emailCode').value;
            if (!email || !code) { 
                showToast('请填写完整信息', 'warning');
                return; 
            }
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/doLogin';
            const u = document.createElement('input'); 
            u.name='username'; 
            u.value=email+'__email_code__'+code; 
            form.appendChild(u);
            const p = document.createElement('input'); 
            p.name='password'; 
            p.value='__email_code__'; 
            form.appendChild(p);
            document.body.appendChild(form); 
            form.submit();
        }

        // Add input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                const icon = this.parentElement.querySelector('.input-icon');
                if (icon) icon.style.color = 'var(--color-primary)';
            });
            input.addEventListener('blur', function() {
                const icon = this.parentElement.querySelector('.input-icon');
                if (icon) icon.style.color = '#999999';
            });
        });
    </script>
</body>
</html>
