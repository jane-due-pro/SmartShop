<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop - 注册</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Register Page Styles */
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            position: relative;
            overflow: hidden;
            padding: var(--space-8);
        }

        .register-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(126, 184, 218, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(107, 163, 232, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(126, 184, 218, 0.08) 0%, transparent 70%);
            animation: backgroundPulse 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes backgroundPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        .register-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }

        .register-card {
            background: #ffffff;
            border-radius: var(--radius-2xl);
            border: 1px solid rgba(126, 184, 218, 0.2);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.1),
                0 0 100px rgba(126, 184, 218, 0.1);
            overflow: hidden;
            animation: cardAppear 0.8s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .register-header {
            text-align: center;
            padding: var(--space-10) var(--space-8) var(--space-8);
            background: linear-gradient(135deg, rgba(126, 184, 218, 0.1) 0%, rgba(107, 163, 232, 0.05) 100%);
            border-bottom: 1px solid rgba(126, 184, 218, 0.1);
        }

        .register-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--space-6);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-3xl);
            font-weight: 700;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(126, 184, 218, 0.3);
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .register-title {
            font-family: var(--font-display);
            font-size: var(--text-3xl);
            font-weight: 600;
            color: #333333;
            margin-bottom: var(--space-2);
        }

        .register-subtitle {
            font-size: var(--text-sm);
            color: #666666;
        }

        .register-body {
            padding: var(--space-8);
        }

        .form-group {
            margin-bottom: var(--space-6);
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: var(--space-3);
            font-size: var(--text-xs);
            font-weight: 600;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: #999999;
            font-size: var(--text-lg);
            transition: color var(--transition-fast);
        }

        .form-input {
            width: 100%;
            padding: var(--space-4) var(--space-4) var(--space-4) var(--space-12);
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: #333333;
            background: #f5f7fa;
            border: 2px solid #e0e4e8;
            border-radius: var(--radius-lg);
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(126, 184, 218, 0.15);
            background: #ffffff;
        }

        .form-input:focus + .input-icon,
        .form-input:focus ~ .input-icon {
            color: var(--color-primary);
        }

        .form-input::placeholder {
            color: #aaaaaa;
        }

        .code-group {
            display: flex;
            gap: var(--space-3);
        }

        .code-group .form-input {
            flex: 1;
        }

        .btn-code {
            white-space: nowrap;
            padding: var(--space-4) var(--space-6);
            background: #ffffff;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: var(--text-sm);
            font-weight: 600;
            transition: all var(--transition-fast);
        }

        .btn-code:hover:not(:disabled) {
            background: var(--color-primary);
            color: #ffffff;
        }

        .btn-code:disabled {
            background: #f0f0f0;
            color: #aaaaaa;
            border-color: #dddddd;
            cursor: not-allowed;
        }

        .btn-register {
            width: 100%;
            padding: var(--space-5);
            margin-top: var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-base);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: #ffffff;
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .btn-register::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(126, 184, 218, 0.4);
        }

        .btn-register:hover::before {
            left: 100%;
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .register-footer {
            padding: var(--space-6) var(--space-8);
            background: #f5f7fa;
            border-top: 1px solid #e0e4e8;
            text-align: center;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: var(--space-6);
        }

        .links a {
            font-size: var(--text-sm);
            color: #666666;
            text-decoration: none;
            transition: color var(--transition-fast);
            position: relative;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-primary);
            transition: width var(--transition-fast);
        }

        .links a:hover {
            color: var(--color-primary);
        }

        .links a:hover::after {
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-container {
                padding: 0;
            }
            
            .register-card {
                border-radius: var(--radius-xl);
            }
            
            .register-header {
                padding: var(--space-8) var(--space-6) var(--space-6);
            }
            
            .register-body {
                padding: var(--space-6);
            }
            
            .register-footer {
                padding: var(--space-4) var(--space-6);
            }
            
            .links {
                flex-direction: column;
                gap: var(--space-4);
            }
        }

        /* Animations */
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="register-page">
        <div class="register-container">
            <div class="register-card">
                <div class="register-header">
                    <div class="register-logo">S</div>
                    <h1 class="register-title">注册账号</h1>
                    <p class="register-subtitle">创建您的SmartShop账号</p>
                </div>

                <div class="register-body">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                            <span class="input-icon">🔒</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入密码" required>
                            <span class="input-icon">🔒</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">邮箱地址</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" class="form-input" placeholder="请输入邮箱" required>
                            <span class="input-icon">📧</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="code-group">
                            <div class="input-wrapper" style="flex: 1;">
                                <input type="text" id="code" class="form-input" placeholder="请输入6位验证码">
                                <span class="input-icon">🔑</span>
                            </div>
                            <button class="btn-code" id="sendBtn" onclick="sendCode()">获取验证码</button>
                        </div>
                    </div>

                    <button class="btn-register" onclick="doRegister()">注 册</button>
                </div>

                <div class="register-footer">
                    <div class="links">
                        <a th:href="@{/login}">已有账号？去登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toast Notification System
        function showToast(message, type = 'info') {
            const container = document.querySelector('.toast-container') || createToastContainer();
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);
            return container;
        }

        // Send Verification Code
        let countdown = 0;
        function sendCode() {
            const email = document.getElementById('email').value;
            if (!email) { 
                showToast('请输入邮箱地址', 'warning');
                return; 
            }
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            fetch('/sendCode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&type=' + encodeURIComponent('注册验证码')
            })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    countdown = 60;
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = countdown + 's';
                        if (countdown <= 0) { 
                            clearInterval(timer); 
                            btn.textContent = '获取验证码'; 
                            btn.disabled = false; 
                        }
                    }, 1000);
                } else { 
                    btn.disabled = false; 
                }
            })
            .catch(() => { 
                showToast('发送失败', 'error');
                btn.disabled = false; 
            });
        }

        // Register
        function doRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;

            if (!username || !password || !email || !code) { 
                showToast('请填写完整信息', 'warning');
                return; 
            }
            if (password !== confirmPassword) { 
                showToast('两次密码输入不一致', 'warning');
                return; 
            }
            if (password.length < 6) { 
                showToast('密码长度不能少于6位', 'warning');
                return; 
            }

            fetch('/doRegister', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'username=' + encodeURIComponent(username) + '&password=' + encodeURIComponent(password) + '&email=' + encodeURIComponent(email) + '&code=' + encodeURIComponent(code)
            })
            .then(r => r.json())
            .then(data => {
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) { 
                    window.location.href = '/login'; 
                }
            })
            .catch(() => showToast('注册失败', 'error'));
        }

        // Add input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--color-primary)';
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.input-icon').style.color = 'var(--text-muted)';
            });
        });
    </script>
</body>
</html>
