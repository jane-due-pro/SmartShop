<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Category List Page Styles */
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-8);
        }

        /* Page Header */
        .page-header {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            padding: var(--space-8);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-4);
        }

        .page-title {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .page-actions {
            display: flex;
            gap: var(--space-4);
        }

        /* Stats Cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
            margin-bottom: var(--space-6);
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            padding: var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            flex-shrink: 0;
        }

        .stat-icon.blue {
            background: rgba(74, 144, 226, 0.1);
            color: var(--color-accent);
        }

        .stat-icon.green {
            background: rgba(46, 204, 113, 0.1);
            color: var(--color-success);
        }

        .stat-icon.gold {
            background: rgba(126, 184, 218, 0.1);
            color: var(--color-primary);
        }

        .stat-content {
            flex: 1;
        }

        .stat-label {
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--space-1);
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Table Card */
        .table-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            overflow: hidden;
        }

        .table-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .table-info {
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: var(--space-4) var(--space-6);
            text-align: left;
            border-bottom: 1px solid var(--border-primary);
        }

        .data-table th {
            background: var(--bg-elevated);
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: var(--text-xs);
            white-space: nowrap;
        }

        .data-table tbody tr {
            transition: background var(--transition-fast);
        }

        .data-table tbody tr:hover {
            background: var(--bg-secondary);
        }

        .data-table tbody tr:nth-child(even) {
            background: var(--bg-tertiary);
        }

        .data-table tbody tr:nth-child(even):hover {
            background: var(--bg-secondary);
        }

        .data-table td {
            color: var(--text-secondary);
            font-size: var(--text-sm);
        }

        .category-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-description {
            color: var(--text-muted);
            font-size: var(--text-xs);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .category-actions {
            display: flex;
            gap: var(--space-2);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--text-sm);
        }

        .btn-icon:hover {
            background: var(--color-primary);
            color: var(--color-secondary-dark);
            border-color: var(--color-primary);
        }

        .btn-icon.danger:hover {
            background: var(--color-danger);
            border-color: var(--color-danger);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--space-16) var(--space-8);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: var(--space-6);
            opacity: 0.5;
        }

        .empty-title {
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .empty-description {
            color: var(--text-muted);
            margin-bottom: var(--space-6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-container {
                padding: var(--space-4);
            }
            
            .page-header {
                padding: var(--space-6);
                flex-direction: column;
                align-items: flex-start;
            }
            
            .page-actions {
                width: 100%;
            }
            
            .page-actions .btn {
                flex: 1;
            }
            
            .stats-row {
                grid-template-columns: 1fr;
            }
            
            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-2);
            }
        }

        /* Animations */
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="page-container animate-fadeIn">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">分类管理</h1>
            <div class="page-actions">
                <a th:href="@{/category/add}" class="btn btn-primary">
                    <span>➕</span> 添加分类
                </a>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon blue">📁</div>
                <div class="stat-content">
                    <div class="stat-label">总分类数</div>
                    <div class="stat-value" th:text="${#lists.size(categories)}">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">✓</div>
                <div class="stat-content">
                    <div class="stat-label">系统状态</div>
                    <div class="stat-value">正常</div>
                </div>
            </div>
        </div>

        <!-- Table Card -->
        <div class="table-card">
            <div class="table-header">
                <h2 class="table-title">分类列表</h2>
                <span class="table-info" th:text="'共 ' + ${#lists.size(categories)} + ' 个分类'">共 0 个分类</span>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>分类名称</th>
                            <th>描述</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td th:text="${cat.id}">1</td>
                            <td>
                                <span class="category-name" th:text="${cat.name}">分类名称</span>
                            </td>
                            <td>
                                <span class="category-description" th:text="${cat.descp}">描述</span>
                            </td>
                            <td>
                                <div class="category-actions">
                                    <a th:href="@{/category/edit/{id}(id=${cat.id})}" class="btn-icon" title="编辑">✏️</a>
                                    <button class="btn-icon danger" title="删除" th:onclick="'deleteCategory(' + ${cat.id} + ')'">🗑️</button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4">
                                <div class="empty-state">
                                    <div class="empty-icon">📁</div>
                                    <h3 class="empty-title">暂无分类数据</h3>
                                    <p class="empty-description">点击上方"添加分类"按钮创建第一个分类</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Toast Notification System
        function showToast(message, type = 'info') {
            const container = document.querySelector('.toast-container') || createToastContainer();
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type]}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);
            return container;
        }

        // Custom Confirm Modal
        function showConfirm(message, callback) {
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.innerHTML = `
                <div class="confirm-box">
                    <div class="confirm-icon">⚠️</div>
                    <div class="confirm-title">确认操作</div>
                    <div class="confirm-message">${message}</div>
                    <div class="confirm-buttons">
                        <button class="confirm-btn confirm-btn-cancel" onclick="this.closest('.confirm-overlay').remove()">取消</button>
                        <button class="confirm-btn confirm-btn-danger" id="confirmOkBtn">确认删除</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            overlay.querySelector('#confirmOkBtn').addEventListener('click', function() {
                overlay.remove();
                callback();
            });
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) overlay.remove();
            });
        }

        // Delete Category
        function deleteCategory(id) {
            showConfirm('确定要删除这个分类吗？此操作不可恢复。', function() {
                fetch('/category/delete/' + id, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        showToast(data.message, data.success ? 'success' : 'error');
                        if (data.success) { 
                            location.reload(); 
                        }
                    })
                    .catch(() => showToast('删除失败', 'error'));
            });
        }
    </script>
</body>
</html>
