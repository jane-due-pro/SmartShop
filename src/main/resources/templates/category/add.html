<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加分类</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Add Category Page Styles */
        .page-container {
            max-width: 700px;
            margin: 0 auto;
            padding: var(--space-8);
        }

        /* Page Header */
        .page-header {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            padding: var(--space-8);
            margin-bottom: var(--space-6);
        }

        .page-title {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .page-subtitle {
            font-size: var(--text-sm);
            color: var(--text-muted);
            margin-top: var(--space-2);
        }

        /* Form Card */
        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            overflow: hidden;
        }

        .form-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .form-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(126, 184, 218, 0.1) 0%, rgba(107, 163, 232, 0.1) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
        }

        .form-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .form-description {
            font-size: var(--text-sm);
            color: var(--text-muted);
            margin-top: var(--space-1);
        }

        .form-body {
            padding: var(--space-8);
        }

        .form-group {
            margin-bottom: var(--space-6);
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-label .required {
            color: var(--color-danger);
            margin-left: var(--space-1);
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 2px solid var(--border-primary);
            border-radius: var(--radius-lg);
            transition: all var(--transition-fast);
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(126, 184, 218, 0.15);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-muted);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-hint {
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-top: var(--space-2);
        }

        .form-footer {
            padding: var(--space-6);
            border-top: 1px solid var(--border-primary);
            background: var(--bg-elevated);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-container {
                padding: var(--space-4);
            }
            
            .page-header {
                padding: var(--space-6);
            }
            
            .form-body {
                padding: var(--space-6);
            }
            
            .form-footer {
                flex-direction: column;
            }
            
            .form-footer .btn {
                width: 100%;
            }
        }

        /* Animations */
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="page-container animate-fadeIn">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">添加分类</h1>
            <p class="page-subtitle">创建新的商品分类</p>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <div class="form-header">
                <div class="form-icon">📁</div>
                <div>
                    <h2 class="form-title">分类信息</h2>
                    <p class="form-description">带 <span style="color: var(--color-danger);">*</span> 的为必填项</p>
                </div>
            </div>

            <div class="form-body">
                <div class="form-group">
                    <label class="form-label">分类名称 <span class="required">*</span></label>
                    <input type="text" id="name" class="form-input" placeholder="请输入分类名称" required>
                </div>

                <div class="form-group">
                    <label class="form-label">分类描述</label>
                    <textarea id="descp" class="form-textarea" placeholder="请输入分类描述"></textarea>
                    <p class="form-hint">可选，用于描述该分类的特点或用途</p>
                </div>
            </div>

            <div class="form-footer">
                <a th:href="@{/category/list}" class="btn btn-secondary">取消</a>
                <button class="btn btn-primary" onclick="doAdd()">
                    <span>➕</span> 添加分类
                </button>
            </div>
        </div>
    </div>

    <script>
        // Toast Notification System
        function showToast(message, type) {
            const container = document.querySelector('.toast-container') || createToastContainer();
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type || 'info'}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type || 'info']}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);
            return container;
        }

        // Save message before redirect
        function showToastAndRedirect(message, type, url) {
            sessionStorage.setItem('toastMessage', message);
            sessionStorage.setItem('toastType', type || 'info');
            window.location.href = url;
        }

        // Add Category
        function doAdd() {
            const name = document.getElementById('name').value;
            const descp = document.getElementById('descp').value;

            if (!name) { 
                showToast('请输入分类名称', 'warning');
                return; 
            }

            const data = { 
                name: name, 
                descp: descp 
            };

            fetch('/category/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(result => {
                showToastAndRedirect(result.message, result.success ? 'success' : 'error', '/category/list');
            })
            .catch(() => showToast('添加失败', 'error'));
        }
    </script>
</body>
</html>
