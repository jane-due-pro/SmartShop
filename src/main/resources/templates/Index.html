<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop 智能商城</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Main Layout Styles */
        .app-container {
            display: flex;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-primary);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: var(--z-fixed);
            transition: all var(--transition-base);
        }

        .sidebar-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .sidebar-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--color-secondary-dark);
            box-shadow: var(--shadow-glow);
            flex-shrink: 0;
        }

        .sidebar-brand {
            flex: 1;
            min-width: 0;
        }

        .sidebar-brand h1 {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-brand p {
            font-size: var(--text-xs);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0;
        }

        .sidebar-nav {
            flex: 1;
            padding: var(--space-4) 0;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: var(--space-6);
        }

        .nav-section-title {
            padding: 0 var(--space-6) var(--space-3);
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin: var(--space-1) var(--space-3);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4) var(--space-5);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-lg);
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 100%;
            background: var(--color-primary);
            transform: scaleY(0);
            transition: transform var(--transition-fast);
        }

        .nav-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: rgba(126, 184, 218, 0.1);
            color: var(--color-primary);
        }

        .nav-link.active::before {
            transform: scaleY(1);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-lg);
            flex-shrink: 0;
        }

        .nav-text {
            font-size: var(--text-sm);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer {
            padding: var(--space-4) var(--space-6);
            border-top: 1px solid var(--border-primary);
            background: var(--bg-tertiary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-dark) 100%);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-sm);
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-size: var(--text-xs);
            color: var(--text-muted);
        }

        .logout-btn {
            padding: var(--space-2) var(--space-4);
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            font-size: var(--text-xs);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
        }

        .logout-btn:hover {
            background: var(--color-danger);
            color: white;
            border-color: var(--color-danger);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Header */
        .top-header {
            height: 70px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-8);
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: var(--space-6);
        }

        .page-title {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text-primary);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .breadcrumb a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color var(--transition-fast);
        }

        .breadcrumb a:hover {
            color: var(--color-primary);
        }

        .breadcrumb-separator {
            color: var(--text-muted);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .header-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
        }

        .header-icon:hover {
            background: var(--bg-elevated);
            color: var(--color-primary);
        }

        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 18px;
            height: 18px;
            background: var(--color-danger);
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-secondary);
        }

        /* Content Frame */
        .content-frame {
            flex: 1;
            padding: var(--space-8);
            background: var(--bg-primary);
        }

        .content-frame iframe {
            width: 100%;
            height: calc(100vh - 150px);
            border: none;
            border-radius: var(--radius-lg);
            background: var(--bg-secondary);
            box-shadow: var(--shadow-md);
        }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                width: 80px;
            }
            
            .sidebar-header {
                padding: var(--space-4);
                justify-content: center;
            }
            
            .sidebar-brand {
                display: none;
            }
            
            .nav-section-title {
                display: none;
            }
            
            .nav-link {
                justify-content: center;
                padding: var(--space-4);
            }
            
            .nav-text {
                display: none;
            }
            
            .sidebar-footer {
                padding: var(--space-4);
            }
            
            .user-info {
                display: none;
            }
            
            .logout-btn {
                width: 40px;
                height: 40px;
                padding: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            
            .logout-btn span {
                display: none;
            }
            
            .main-content {
                margin-left: 80px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .top-header {
                padding: 0 var(--space-4);
            }
            
            .content-frame {
                padding: var(--space-4);
            }
            
            .content-frame iframe {
                height: calc(100vh - 120px);
            }
            
            .mobile-menu-toggle {
                display: flex;
            }
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            background: var(--bg-tertiary);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            cursor: pointer;
            border: none;
        }

        /* Loading Animation */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-base);
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-primary);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tooltip */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-5px);
            padding: var(--space-2) var(--space-3);
            background: var(--bg-elevated);
            color: var(--text-primary);
            font-size: var(--text-xs);
            font-weight: 500;
            border-radius: var(--radius-md);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-lg);
            z-index: var(--z-tooltip);
        }

        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-10px);
        }

        /* Quick Actions */
        .quick-actions {
            position: fixed;
            bottom: var(--space-8);
            right: var(--space-8);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            z-index: var(--z-fixed);
        }

        .quick-action-btn {
            width: 50px;
            height: 50px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: var(--color-secondary-dark);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-xl);
            box-shadow: var(--shadow-glow);
            transition: all var(--transition-base);
        }

        .quick-action-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(126, 184, 218, 0.4);
        }

        .quick-action-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">S</div>
                <div class="sidebar-brand">
                    <h1>SmartShop</h1>
                    <p>管理系统</p>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">主导航</div>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a th:href="@{/welcome}" target="mainFrame" class="nav-link active">
                                <span class="nav-icon">🏠</span>
                                <span class="nav-text">系统首页</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a th:href="@{/product/list}" target="mainFrame" class="nav-link">
                                <span class="nav-icon">📦</span>
                                <span class="nav-text">商品管理</span>
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('admin')">
                            <a th:href="@{/category/list}" target="mainFrame" class="nav-link">
                                <span class="nav-icon">📁</span>
                                <span class="nav-text">分类管理</span>
                            </a>
                        </li>
                    </ul>
                </div>


            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" th:text="${username.substring(0, 1).toUpperCase()}">U</div>
                    <div class="user-info">
                        <div class="user-name" th:text="${username}">用户</div>
                        <div class="user-role" sec:authorize="hasRole('admin')">管理员</div>
                        <div class="user-role" sec:authorize="!hasRole('admin')">普通用户</div>
                    </div>
                    <a th:href="@{/logout}" class="logout-btn tooltip" data-tooltip="退出登录">
                        <span>🚪</span>
                        <span>退出</span>
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="header-left">
                    <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                        <span>☰</span>
                    </button>
                    <h2 class="page-title">仪表盘</h2>
                    <div class="breadcrumb">
                        <a th:href="@{/welcome}">首页</a>
                        <span class="breadcrumb-separator">/</span>
                        <span>仪表盘</span>
                    </div>
                </div>
            </header>

            <!-- Content Frame -->
            <div class="content-frame">
                <iframe name="mainFrame" id="mainFrame" th:src="@{/welcome}"></iframe>
            </div>
        </main>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
        <button class="quick-action-btn tooltip" data-tooltip="刷新页面" onclick="refreshFrame()">
            <span>🔄</span>
        </button>
        <button class="quick-action-btn tooltip" data-tooltip="全屏" onclick="toggleFullscreen()">
            <span>⛶</span>
        </button>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // Sidebar Navigation Active State
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function() {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                // Show loading overlay
                showLoading();
            });
        });

        // Iframe Load Event
        document.getElementById('mainFrame').addEventListener('load', function() {
            hideLoading();
        });

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('active');
        }

        // Loading Functions
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        // Refresh Frame
        function refreshFrame() {
            showLoading();
            document.getElementById('mainFrame').src = document.getElementById('mainFrame').src;
        }

        // Toggle Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Keyboard Shortcuts
        document.addEventListener('keydown', function(e) {
            // F5 to refresh
            if (e.key === 'F5') {
                e.preventDefault();
                refreshFrame();
            }
            
            // F11 to toggle fullscreen
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
            
            // Ctrl+Shift+R to hard refresh
            if (e.ctrlKey && e.shiftKey && e.key === 'R') {
                e.preventDefault();
                refreshFrame();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Hide loading after page load
            setTimeout(hideLoading, 500);
        });
    </script>
</body>
</html>
