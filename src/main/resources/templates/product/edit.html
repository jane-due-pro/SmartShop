<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑商品</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Edit Product Page Styles */
        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-8);
        }

        /* Page Header */
        .page-header {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            padding: var(--space-8);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .page-subtitle {
            font-size: var(--text-sm);
            color: var(--text-muted);
            margin-top: var(--space-2);
        }

        .product-id {
            display: inline-flex;
            padding: var(--space-2) var(--space-4);
            background: rgba(74, 144, 226, 0.1);
            color: var(--color-accent);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: 600;
        }

        /* Form Card */
        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            overflow: hidden;
        }

        .form-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .form-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(126, 184, 218, 0.1) 0%, rgba(107, 163, 232, 0.1) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
        }

        .form-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .form-description {
            font-size: var(--text-sm);
            color: var(--text-muted);
            margin-top: var(--space-1);
        }

        .form-body {
            padding: var(--space-8);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-6);
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-label {
            display: block;
            margin-bottom: var(--space-2);
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-label .required {
            color: var(--color-danger);
            margin-left: var(--space-1);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 2px solid var(--border-primary);
            border-radius: var(--radius-lg);
            transition: all var(--transition-fast);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(126, 184, 218, 0.15);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-muted);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-hint {
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-top: var(--space-2);
        }

        .form-footer {
            padding: var(--space-6);
            border-top: 1px solid var(--border-primary);
            background: var(--bg-elevated);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-container {
                padding: var(--space-4);
            }
            
            .page-header {
                padding: var(--space-6);
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-4);
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
            
            .form-body {
                padding: var(--space-6);
            }
            
            .form-footer {
                flex-direction: column;
            }
            
            .form-footer .btn {
                width: 100%;
            }
        }

        /* Animations */
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <script>if (window.self === window.top) window.location.href = '/index#' + window.location.pathname;</script>
    <div class="page-container animate-fadeIn">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">编辑商品</h1>
                <p class="page-subtitle">修改商品信息</p>
            </div>
            <span class="product-id" th:text="'ID: ' + ${product.id}">ID: 1</span>
        </div>

        <!-- Form Card -->
        <div class="form-card">
            <div class="form-header">
                <div class="form-icon">✏️</div>
                <div>
                    <h2 class="form-title">商品信息</h2>
                    <p class="form-description">带 <span style="color: var(--color-danger);">*</span> 的为必填项</p>
                </div>
            </div>

            <div class="form-body">
                <input type="hidden" id="id" th:value="${product.id}">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">商品名称 <span class="required">*</span></label>
                        <input type="text" id="name" class="form-input" th:value="${product.name}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">商品分类 <span class="required">*</span></label>
                        <select id="catId" class="form-select" required>
                            <option value="">请选择分类</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == product.catId}"></option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">价格 <span class="required">*</span></label>
                        <input type="number" id="price" class="form-input" th:value="${product.price}" step="0.01" min="0" required>
                        <p class="form-hint">单位：元，支持两位小数</p>
                    </div>

                    <div class="form-group">
                        <label class="form-label">发布日期</label>
                        <input type="date" id="releaseDate" class="form-input" th:value="${#dates.format(product.releaseDate, 'yyyy-MM-dd')}">
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">商品图片</label>
                        <div style="margin-bottom: var(--space-2);">
                            <img id="currentImg" th:src="${product.photoUrl}" onerror="this.src='/uploads/products/base.jpg'" style="max-width:120px; max-height:80px; border-radius:8px; border:1px solid var(--border-primary);" />
                        </div>
                        <input type="file" id="photoFile" class="form-input" accept="image/*">
                        <p class="form-hint">选择新图片可替换当前图片</p>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">商品描述</label>
                        <textarea id="descp" class="form-textarea" th:text="${product.descp}"></textarea>
                    </div>
                </div>
            </div>

            <div class="form-footer">
                <a th:href="@{/product/list}" class="btn btn-secondary">取消</a>
                <button class="btn btn-primary" onclick="doEdit()">
                    <span>💾</span> 保存修改
                </button>
            </div>
        </div>
    </div>

    <script>
        // Toast Notification System
        function showToast(message, type) {
            const container = document.querySelector('.toast-container') || createToastContainer();
            const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
            const toast = document.createElement('div');
            toast.className = `toast ${type || 'info'}`;
            toast.innerHTML = `<span class="toast-icon">${icons[type || 'info']}</span><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.className = 'toast-container';
            document.body.appendChild(container);
            return container;
        }

        // Save message before redirect
        function showToastAndRedirect(message, type, url) {
            sessionStorage.setItem('toastMessage', message);
            sessionStorage.setItem('toastType', type || 'info');
            window.location.href = url;
        }

        // Show saved message on page load
        window.addEventListener('DOMContentLoaded', function() {
            const message = sessionStorage.getItem('toastMessage');
            const type = sessionStorage.getItem('toastType');
            if (message) {
                showToast(message, type);
                sessionStorage.removeItem('toastMessage');
                sessionStorage.removeItem('toastType');
            }
        });

        // Edit Product
        function doEdit() {
            const id = document.getElementById('id').value;
            const name = document.getElementById('name').value;
            const catId = document.getElementById('catId').value;
            const price = document.getElementById('price').value;
            const currentImg = document.getElementById('currentImg');
            const photoUrl = currentImg ? currentImg.src : '/uploads/products/base.jpg';
            const descp = document.getElementById('descp').value;
            const releaseDate = document.getElementById('releaseDate').value;
            const photoFile = document.getElementById('photoFile').files[0];

            if (!name || !catId || !price) { 
                showToast('请填写必填项', 'warning');
                return; 
            }

            const data = {
                id: parseInt(id),
                name: name,
                catId: parseInt(catId),
                price: parseFloat(price),
                photoUrl: photoUrl,
                descp: descp,
                releaseDate: releaseDate || new Date().toISOString().split('T')[0]
            };

            fetch('/product/edit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(result => {
                if (!result.success) { showToast(result.message, 'error'); return; }
                if (photoFile) {
                    const fd = new FormData();
                    fd.append('file', photoFile);
                    fetch('/product/uploadImage/' + id, { method: 'POST', body: fd })
                        .then(r => r.json())
                        .then(() => showToastAndRedirect('修改成功', 'success', '/product/list'))
                        .catch(() => showToastAndRedirect('修改成功（图片上传失败）', 'warning', '/product/list'));
                } else {
                    showToastAndRedirect(result.message, 'success', '/product/list');
                }
            })
            .catch(() => showToast('保存失败', 'error'));
        }
    </script>
</body>
</html>
