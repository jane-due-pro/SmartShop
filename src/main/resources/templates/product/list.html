<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <style>
        /* Product List Page Styles */
        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-8);
        }

        /* Page Header */
        .page-header {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            padding: var(--space-8);
            margin-bottom: var(--space-6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-4);
        }

        .page-title {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .page-actions {
            display: flex;
            gap: var(--space-4);
        }

        /* Search Form */
        .search-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            margin-bottom: var(--space-6);
            overflow: hidden;
        }

        .search-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .search-toggle {
            padding: var(--space-2) var(--space-4);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .search-toggle:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .search-body {
            padding: var(--space-6);
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-6);
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            margin-bottom: var(--space-2);
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: var(--space-3) var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            color: var(--text-primary);
            background: var(--bg-secondary);
            border: 2px solid var(--border-primary);
            border-radius: var(--radius-lg);
            transition: all var(--transition-fast);
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-actions {
            display: flex;
            gap: var(--space-3);
            align-items: flex-end;
        }

        /* Table Card */
        .table-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-primary);
            overflow: hidden;
        }

        .table-header {
            padding: var(--space-6);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-title {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0;
        }

        .table-info {
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: var(--space-4) var(--space-6);
            text-align: left;
            border-bottom: 1px solid var(--border-primary);
        }

        .data-table th {
            background: var(--bg-elevated);
            font-weight: 600;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: var(--text-xs);
            white-space: nowrap;
        }

        .data-table tbody tr {
            transition: background var(--transition-fast);
        }

        .data-table tbody tr:hover {
            background: var(--bg-secondary);
        }

        .data-table tbody tr:nth-child(even) {
            background: var(--bg-tertiary);
        }

        .data-table tbody tr:nth-child(even):hover {
            background: var(--bg-secondary);
        }

        .data-table td {
            color: var(--text-secondary);
            font-size: var(--text-sm);
        }

        .product-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .product-category {
            display: inline-flex;
            padding: var(--space-1) var(--space-3);
            background: rgba(74, 144, 226, 0.1);
            color: var(--color-accent);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 500;
        }

        .product-price {
            font-family: var(--font-display);
            font-weight: 700;
            color: var(--color-primary);
            font-size: var(--text-base);
        }

        .product-date {
            color: var(--text-muted);
            font-size: var(--text-xs);
        }

        .product-actions {
            display: flex;
            gap: var(--space-2);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--text-sm);
        }

        .btn-icon:hover {
            background: var(--color-primary);
            color: var(--color-secondary-dark);
            border-color: var(--color-primary);
        }

        .btn-icon.danger:hover {
            background: var(--color-danger);
            border-color: var(--color-danger);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--space-16) var(--space-8);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: var(--space-6);
            opacity: 0.5;
        }

        .empty-title {
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .empty-description {
            color: var(--text-muted);
            margin-bottom: var(--space-6);
        }

        /* Pagination */
        .pagination-container {
            padding: var(--space-6);
            border-top: 1px solid var(--border-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-4);
        }

        .pagination-info {
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .pagination {
            display: flex;
            gap: var(--space-2);
        }

        .pagination a,
        .pagination span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 var(--space-3);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 500;
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .pagination a:hover {
            background: var(--color-primary);
            color: var(--color-secondary-dark);
            border-color: var(--color-primary);
        }

        .pagination .active {
            background: var(--color-primary);
            color: var(--color-secondary-dark);
            border-color: var(--color-primary);
        }

        .pagination .disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-container {
                padding: var(--space-4);
            }
            
            .page-header {
                padding: var(--space-6);
                flex-direction: column;
                align-items: flex-start;
            }
            
            .page-actions {
                width: 100%;
            }
            
            .page-actions .btn {
                flex: 1;
            }
            
            .search-form {
                grid-template-columns: 1fr;
            }
            
            .form-actions {
                grid-column: span 1;
            }
            
            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-2);
            }
            
            .pagination-container {
                flex-direction: column;
                align-items: center;
            }
        }

        /* Animations */
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="page-container animate-fadeIn">
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">商品管理</h1>
            <div class="page-actions">
                <a th:href="@{/product/add}" class="btn btn-primary">
                    <span>➕</span> 添加商品
                </a>
            </div>
        </div>

        <!-- Search Form -->
        <div class="search-card">
            <div class="search-header">
                <h2 class="search-title">筛选条件</h2>
                <button class="search-toggle" onclick="toggleSearch()">收起</button>
            </div>
            <div class="search-body" id="searchBody">
                <form id="searchForm" th:action="@{/product/list}" method="get">
                    <div class="search-form">
                        <div class="form-group">
                            <label class="form-label">商品分类</label>
                            <select name="catId" class="form-select">
                                <option value="">全部分类</option>
                                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${catId != null and catId == cat.id}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">商品名称</label>
                            <input type="text" name="name" class="form-input" placeholder="输入名称搜索" th:value="${name}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">最低价格</label>
                            <input type="number" name="minPrice" class="form-input" placeholder="最低价" step="0.01" th:value="${minPrice}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">最高价格</label>
                            <input type="number" name="maxPrice" class="form-input" placeholder="最高价" step="0.01" th:value="${maxPrice}">
                        </div>
                        <div class="form-group form-actions">
                            <button type="submit" class="btn btn-primary">
                                <span>🔍</span> 搜索
                            </button>
                            <a th:href="@{/product/list}" class="btn btn-secondary">
                                <span>↻</span> 重置
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="table-card">
            <div class="table-header">
                <h2 class="table-title">商品列表</h2>
                <span class="table-info" th:text="'共 ' + ${pageInfo.total} + ' 条记录'">共 0 条记录</span>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>商品名称</th>
                            <th>分类</th>
                            <th>价格</th>
                            <th>描述</th>
                            <th>发布日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${pageInfo.list}">
                            <td th:text="${product.id}">1</td>
                            <td>
                                <span class="product-name" th:text="${product.name}">商品名称</span>
                            </td>
                            <td>
                                <span class="product-category" th:text="${product.categoryName}">分类</span>
                            </td>
                            <td>
                                <span class="product-price" th:text="'¥' + ${#numbers.formatDecimal(product.price, 1, 2)}">¥0.00</span>
                            </td>
                            <td th:text="${#strings.abbreviate(product.descp, 30)}">描述</td>
                            <td>
                                <span class="product-date" th:text="${#dates.format(product.releaseDate, 'yyyy-MM-dd')}">2024-01-01</span>
                            </td>
                            <td>
                                <div class="product-actions">
                                    <a th:href="@{/product/edit/{id}(id=${product.id})}" class="btn-icon" title="编辑">✏️</a>
                                    <button class="btn-icon danger" title="删除" th:onclick="'deleteProduct(' + ${product.id} + ')'">🗑️</button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pageInfo.list)}">
                            <td colspan="7">
                                <div class="empty-state">
                                    <div class="empty-icon">📦</div>
                                    <h3 class="empty-title">暂无商品数据</h3>
                                    <p class="empty-description">点击上方"添加商品"按钮创建第一个商品</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="pagination-container" th:if="${pageInfo.pages > 1}">
                <div class="pagination-info">
                    <span th:text="'第 ' + ${pageInfo.pageNum} + ' 页 / 共 ' + ${pageInfo.pages} + ' 页'"></span>
                </div>
                <div class="pagination">
                    <a th:href="@{/product/list(pageNum=1, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}" th:classappend="${pageInfo.pageNum == 1} ? 'disabled' : ''">首页</a>
                    <a th:href="@{/product/list(pageNum=${pageInfo.pageNum - 1}, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}" th:if="${pageInfo.pageNum > 1}">上一页</a>
                    <span class="active" th:text="${pageInfo.pageNum}"></span>
                    <a th:href="@{/product/list(pageNum=${pageInfo.pageNum + 1}, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}" th:if="${pageInfo.pageNum < pageInfo.pages}">下一页</a>
                    <a th:href="@{/product/list(pageNum=${pageInfo.pages}, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}" th:classappend="${pageInfo.pageNum == pageInfo.pages} ? 'disabled' : ''">尾页</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Toggle Search Form
        function toggleSearch() {
            const searchBody = document.getElementById('searchBody');
            const toggleBtn = document.querySelector('.search-toggle');
            if (searchBody.style.display === 'none') {
                searchBody.style.display = 'block';
                toggleBtn.textContent = '收起';
            } else {
                searchBody.style.display = 'none';
                toggleBtn.textContent = '展开';
            }
        }

        // Delete Product
        function deleteProduct(id) {
            if (confirm('确定要删除这个商品吗？此操作不可恢复。')) {
                fetch('/product/delete/' + id, { method: 'POST' })
                    .then(r => r.json())
                    .then(data => {
                        alert(data.message);
                        if (data.success) { 
                            location.reload(); 
                        }
                    })
                    .catch(() => alert('删除失败'));
            }
        }

        // Add hover effects to table rows
        document.querySelectorAll('.data-table tbody tr').forEach(row => {
            row.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.01)';
            });
            row.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
