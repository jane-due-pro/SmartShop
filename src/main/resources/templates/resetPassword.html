<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartShop - 找回密码</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; width: 420px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { color: #333; font-size: 28px; margin-bottom: 8px; }
        .login-header p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; font-size: 14px; }
        .links a:hover { text-decoration: underline; }
        .code-group { display: flex; gap: 10px; }
        .code-group input { flex: 1; }
        .btn-code { white-space: nowrap; padding: 12px 16px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .btn-code:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>找回密码</h1>
            <p>通过邮箱验证码重置密码</p>
        </div>

        <div class="form-group">
            <label>邮箱地址</label>
            <input type="email" id="email" placeholder="请输入注册邮箱" required>
        </div>
        <div class="form-group">
            <label>验证码</label>
            <div class="code-group">
                <input type="text" id="code" placeholder="请输入6位验证码">
                <button class="btn-code" id="sendBtn" onclick="sendCode()">获取验证码</button>
            </div>
        </div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" id="newPassword" placeholder="请输入新密码" required>
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入新密码" required>
        </div>
        <button class="btn btn-primary" onclick="doReset()">重置密码</button>
        <div class="links">
            <a th:href="@{/login}">返回登录</a>
        </div>
    </div>

    <script>
        let countdown = 0;
        function sendCode() {
            const email = document.getElementById('email').value;
            if (!email) { alert('请输入邮箱地址'); return; }
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            fetch('/sendCode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&type=' + encodeURIComponent('密码重置验证码')
            })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    countdown = 60;
                    const timer = setInterval(() => {
                        countdown--;
                        btn.textContent = countdown + 's';
                        if (countdown <= 0) { clearInterval(timer); btn.textContent = '获取验证码'; btn.disabled = false; }
                    }, 1000);
                } else { btn.disabled = false; }
            })
            .catch(() => { alert('发送失败'); btn.disabled = false; });
        }

        function doReset() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !code || !newPassword) { alert('请填写完整信息'); return; }
            if (newPassword !== confirmPassword) { alert('两次密码输入不一致'); return; }
            if (newPassword.length < 6) { alert('密码长度不能少于6位'); return; }

            fetch('/doResetPassword', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'email=' + encodeURIComponent(email) + '&code=' + encodeURIComponent(code) + '&newPassword=' + encodeURIComponent(newPassword)
            })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                if (data.success) { window.location.href = '/login'; }
            })
            .catch(() => alert('重置失败'));
        }
    </script>
</body>
</html>
